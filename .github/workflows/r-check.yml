name: R check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-22.04
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev libpq-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::lintr
            any::testthat
          needs: check

      - name: R CMD check
        run: |
          rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--no-examples", "--no-build-vignettes"),
            error_on = "error"
          )
        shell: Rscript {0}

      - name: lintr
        run: lintr::lint_package()
        shell: Rscript {0}
